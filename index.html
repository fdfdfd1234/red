<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temporary</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0d1117;
            color: #00ff66;
            font-family: 'Comfortaa', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
            padding: 20px;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                linear-gradient(rgba(13, 17, 23, 0.9), rgba(13, 17, 23, 0.9)),
                url('https://images.unsplash.com/photo-1510511459019-5dda7724fd87?auto=format&fit=crop&w=1600&q=80') no-repeat center center/cover;
            z-index: -1;
        }

        .container {
            text-align: center;
            background: rgba(20, 27, 38, 0.8);
            padding: 40px 30px;
            border-radius: 24px;
            border: 1px solid rgba(0, 255, 102, 0.2);
            box-shadow: 0 0 30px rgba(0, 255, 102, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            max-width: 500px;
            width: 100%;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(0, 255, 102, 0.5);
            letter-spacing: 1px;
            word-wrap: break-word;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: inline-block;
            text-decoration: none;
            font-family: 'Comfortaa', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            padding: 16px 20px;
            border-radius: 8px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .btn-primary,
        .btn-secondary {
            background-color: transparent;
            color: #00ff66;
            border: 2px solid #00ff66;
            box-shadow: inset 0 0 10px rgba(0, 255, 102, 0.1);
        }

        @media (hover: hover) {
            .btn-primary:hover,
            .btn-secondary:hover {
                background-color: rgba(0, 255, 102, 0.1);
                box-shadow: 0 0 20px rgba(0, 255, 102, 0.3),
                            inset 0 0 10px rgba(0, 255, 102, 0.2);
                transform: translateY(-2px);
            }
        }

        .btn:active {
            transform: translateY(1px);
        }

        .domain-info {
            margin-top: 25px;
            font-size: 0.95rem;
            line-height: 1.5;
            color: rgba(0, 255, 102, 0.85);
            word-break: break-word;
        }

        .domain-link {
            color: #00ff66;
            text-decoration: none;
            font-weight: 700;
            position: relative;
            text-shadow: 0 0 6px rgba(0, 255, 102, 0.4);
            transition: all 0.3s ease;
        }

        @media (hover: hover) {
            .domain-link:hover {
                text-shadow: 0 0 10px rgba(0, 255, 102, 0.7);
                opacity: 0.9;
            }
        }

        @media (max-width: 360px) {
            h1 {
                font-size: 1.8rem;
            }

            .container {
                padding: 30px 20px;
            }

            .domain-info {
                font-size: 0.85rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>АКТУАЛЬНЫЕ ССЫЛКИ</h1>

        <div class="button-group">
            <a href="https://t.me/msusandpeach_bot?start=inv-69e543885d776" class="btn btn-primary">Empire</a>
            <a href="https://t.me/jsusanxs_bot?start=inv-68c9d221c3875" class="btn btn-secondary">Strawberry</a>
            <a href="https://t.me/jsusanxs_bot?start=inv-68c9d221c3875" class="btn btn-secondary">Noctaria</a>
        </div>
    </div>
</body>
</html>
